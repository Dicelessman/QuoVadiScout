<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes" />
<title>Quovadiscout - Strutture & Terreni v1.2</title>
<meta name="description" content="Sistema avanzato per la gestione di strutture e terreni scout" />
<meta name="theme-color" content="#2f6b2f" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="QuoVadiScout" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏕️</text></svg>">
<link rel="stylesheet" href="styles.css">
<!-- Export libraries -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Quovadiscout - Strutture & Terreni v1.1</h1>
    <div class="controls">
      <div class="controls-primary">
        <input id="search" placeholder="Cerca nome, luogo, referente..." />
        <button id="advancedSearchBtn" title="Ricerca Avanzata">🔍+</button>
        <select id="filter-prov"><option value="">Tutte le province</option></select>
        <select id="saved-filters" title="Filtri Salvati">
          <option value="">Filtri salvati</option>
        </select>
        <select id="sort-by">
          <option value="struttura">Ordina per Nome</option>
          <option value="luogo">Ordina per Luogo</option>
          <option value="provincia">Ordina per Provincia</option>
        </select>
      </div>
      <div class="controls-secondary">
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <label><input type="checkbox" id="filter-casa" /> Casa</label>
          <label><input type="checkbox" id="filter-terreno" /> Terreno</label>
          <select id="filter-stato">
            <option value="">Tutti gli stati</option>
            <option value="attiva">🟢 Attiva</option>
            <option value="temporaneamente_non_attiva">🟡 Temporaneamente non attiva</option>
            <option value="non_piu_attiva">🔴 Non più attiva</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <div class="view-toggle">
            <button id="viewToggle" class="btn-view-toggle" title="Cambia visualizzazione">
              <span class="view-icon">📋</span>
              <span class="view-label">Elenco</span>
            </button>
          </div>
          <button id="add-btn">➕ Aggiungi</button>
          <button id="resetBtn">🔄 Reset</button>
        </div>
      </div>
      <div class="controls-secondary">
        <button id="exportBtn" class="btn-elenco-personale">
          <span class="elenco-icon">📋</span>
          <span class="elenco-label">Elenco personale</span>
          <span id="contatore-elenco" class="elenco-counter">0</span>
        </button>
        <div style="display:flex;gap:8px;">
          <button onclick="mostraFeedAttivita()" class="btn-activity" title="Feed Attività">📋</button>
          <button onclick="trovaVicinoAMe()" class="btn-location" title="Trova Vicino a Me">📍</button>
          <button onclick="geocodificaTutteStrutture()" class="btn-geocoding" title="Geocoding Automatico">🌍</button>
          <button onclick="mostraOpzioniEsportazioneGenerale()" class="btn-export">📊 Export</button>
          <button onclick="location.href='dashboard.html'" class="btn-dashboard">📈 Dashboard</button>
          <button id="userBtn" class="btn-user">
            <span class="user-icon">👤</span>
            <span class="user-name">Accedi</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="results" class="cards"></section>
  </main>

  <!-- Modale di modifica -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close">✕</button>
      <h2>Modifica struttura</h2>
      <form id="editForm"></form>
      <div class="modal-actions">
        <button id="saveBtn">💾 Salva</button>
        <button id="deleteBtn" class="danger">🗑️ Elimina</button>
        <button id="cancelBtn">❌ Annulla</button>
      </div>
    </div>
  </div>

<script type="module" src="script.js"></script>
<script src="export.js"></script>
<script src="push-notifications.js"></script>

<script>
// Registrazione Service Worker per PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      // Prova a registrare il service worker
      const registration = await navigator.serviceWorker.register('./service-worker.js');
      console.log('✅ Service Worker registrato:', registration.scope);
      
      // Gestione aggiornamenti
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Nuovo service worker disponibile
            if (confirm('È disponibile una nuova versione dell\'app. Vuoi aggiornare?')) {
              newWorker.postMessage({ action: 'SKIP_WAITING' });
              window.location.reload();
            }
          }
        });
      });
      
    } catch (error) {
      console.warn('⚠️ Service Worker non disponibile (modalità sviluppo):', error.message);
      // In modalità sviluppo, continua senza service worker
      console.log('📱 App funzionante senza PWA features');
    }
  });
}

// Gestione installazione PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  
  // Mostra pulsante installazione personalizzato
  const installBtn = document.createElement('button');
  installBtn.textContent = '📱 Installa App';
  installBtn.className = 'btn-install';
  installBtn.style.cssText = `
    background: #2f6b2f;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 8px;
  `;
  
  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('Risultato installazione:', outcome);
      deferredPrompt = null;
    }
  });
  
  // Aggiungi pulsante alla topbar
  const controls = document.querySelector('.controls-secondary');
  if (controls) {
    controls.appendChild(installBtn);
  }
});

// Gestione installazione completata
window.addEventListener('appinstalled', () => {
  console.log('✅ PWA installata con successo');
  deferredPrompt = null;
});
</script>

</body>
</html>
