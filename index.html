<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Strutture & Terreni — Prototipo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Strutture & Terreni — Prototipo</h1>
    <div class="controls">
      <input id="search" placeholder="Cerca nome, luogo, referente..." />
      <select id="provSelect"><option value="">Tutte le province</option></select>
      <label><input type="checkbox" id="hasCasa" /> Casa</label>
      <label><input type="checkbox" id="hasTerreno" /> Terreno</label>
      <button id="resetBtn">Reset</button>
      <button id="exportBtn">Esporta JSON</button>
    </div>
  </header>

  <main>
    <section id="cards" class="cards"></section>
  </main>

  <!-- Modale di modifica -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close">✕</button>
      <h2>Modifica struttura</h2>
      <form id="editForm"></form>
      <div class="modal-actions">
        <button id="saveBtn">Salva</button>
        <button id="deleteBtn" class="danger">Elimina</button>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
