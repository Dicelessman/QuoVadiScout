<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Strutture & Terreni — Prototipo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Strutture & Terreni — Prototipo</h1>
    <div class="controls">
      <input id="search" placeholder="Cerca nome, luogo, referente..." />
      <select id="filter-prov"><option value="">Tutte le province</option></select>
      <select id="sort-by">
        <option value="struttura">Ordina per Nome</option>
        <option value="luogo">Ordina per Luogo</option>
        <option value="provincia">Ordina per Provincia</option>
        <option value="referente">Ordina per Referente</option>
      </select>
      <label><input type="checkbox" id="filter-casa" /> Casa</label>
      <label><input type="checkbox" id="filter-terreno" /> Terreno</label>
      
      <!-- Filtri Rapidi -->
      <div class="quick-filters">
        <button class="quick-filter" data-filter="all">📊 Tutte</button>
        <button class="quick-filter" data-filter="casa">🏠 Solo Case</button>
        <button class="quick-filter" data-filter="terreno">🌱 Solo Terreni</button>
        <button class="quick-filter" data-filter="entrambe">🏢🌱 Entrambe</button>
        <button class="quick-filter" data-filter="senza">❓ Senza Categoria</button>
      </div>
      <button id="add-btn">Aggiungi</button>
      <button id="resetBtn">Reset</button>
      <button id="exportBtn">Esporta Elenco</button>
      <button id="reloadBtn">🔄 Ricarica</button>
      <button id="importBtn">📊 Importa Excel</button>
      <button id="cleanupBtn">🧹 Rimuovi Duplicati</button>
      <button onclick="location.href='dashboard.html'" class="btn-dashboard">📈 Dashboard</button>
      <input type="file" id="excelFile" accept=".xlsx,.xls" style="display:none;">
      <span id="contatore-elenco" class="contatore">Elenco personale: 0</span>
    </div>
  </header>

  <main>
    <section id="results" class="cards"></section>
  </main>

  <!-- Modale di modifica -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close">✕</button>
      <h2>Modifica struttura</h2>
      <form id="editForm"></form>
      <div class="modal-actions">
        <button id="saveBtn">💾 Salva</button>
        <button id="deleteBtn" class="danger">🗑️ Elimina</button>
        <button id="cancelBtn">❌ Annulla</button>
      </div>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
