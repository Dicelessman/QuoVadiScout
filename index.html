<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes" />
<title>Quovadiscout - Strutture & Terreni v1.2</title>
<meta name="description" content="Sistema avanzato per la gestione di strutture e terreni scout" />
<meta name="theme-color" content="#2f6b2f" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="QuoVadiScout" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏕️</text></svg>">
<link rel="stylesheet" href="styles.css">
<!-- Export libraries -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Maps libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
</head>
<body>
  <!-- Mobile-First Header -->
  <header class="app-header">
    <div class="header-main">
      <div class="header-brand">
        <h1 class="app-title">🏕️ QuoVadiScout</h1>
        <span class="app-version">v1.2</span>
      </div>
      <div class="header-actions">
        <button id="menuToggle" class="btn-menu" aria-label="Menu principale">
          <span class="hamburger"></span>
        </button>
        <button id="themeToggle" class="btn-theme" aria-label="Cambia tema">
          <span class="theme-icon">☀️</span>
        </button>
        <button id="userBtn" class="btn-user" aria-label="Account utente">
          <span class="user-avatar">👤</span>
        </button>
      </div>
    </div>
    
    <!-- Search Bar -->
    <div class="search-section">
      <div class="search-container">
        <input id="search" class="search-input" placeholder="Cerca strutture..." />
        <button id="advancedSearchBtn" class="btn-search-advanced" aria-label="Ricerca avanzata">
          <span class="search-icon">🔍</span>
        </button>
      </div>
    </div>
    
    <!-- Quick Filters -->
    <div class="quick-filters">
      <div class="filter-group">
        <select id="filter-prov" class="filter-select">
          <option value="">Tutte le province</option>
        </select>
        <select id="filter-stato" class="filter-select">
          <option value="">Tutti gli stati</option>
          <option value="attiva">🟢 Attiva</option>
          <option value="temporaneamente_non_attiva">🟡 Temporaneamente non attiva</option>
          <option value="non_piu_attiva">🔴 Non più attiva</option>
        </select>
      </div>
      <div class="filter-toggles">
        <label class="filter-toggle">
          <input type="checkbox" id="filter-casa" />
          <span class="toggle-label">🏠 Casa</span>
        </label>
        <label class="filter-toggle">
          <input type="checkbox" id="filter-terreno" />
          <span class="toggle-label">🌲 Terreno</span>
        </label>
      </div>
    </div>
  </header>

  <!-- Main Navigation Menu -->
  <nav id="mainMenu" class="main-menu hidden">
    <div class="menu-sections">
      <!-- Search & Filters -->
      <section class="menu-section">
        <h3 class="menu-section-title">🔍 Ricerca & Filtri</h3>
        <div class="menu-items">
          <button class="menu-item" onclick="mostraRicercaAvanzata()">
            <span class="menu-icon">🔍</span>
            <span class="menu-label">Ricerca Avanzata</span>
          </button>
          <button class="menu-item" id="savedFiltersBtn">
            <span class="menu-icon">💾</span>
            <span class="menu-label">Filtri Salvati</span>
            <select id="saved-filters" class="menu-select">
              <option value="">Seleziona filtro...</option>
            </select>
          </button>
          <button class="menu-item" id="sortMenuBtn">
            <span class="menu-icon">📊</span>
            <span class="menu-label">Ordina per</span>
            <select id="sort-by" class="menu-select">
              <option value="struttura">Nome</option>
              <option value="luogo">Luogo</option>
              <option value="provincia">Provincia</option>
            </select>
          </button>
        </div>
      </section>

      <!-- Personal Lists -->
      <section class="menu-section">
        <h3 class="menu-section-title">📋 Le Mie Liste</h3>
        <div class="menu-items">
          <button id="exportBtn" class="menu-item menu-item-primary">
            <span class="menu-icon">📋</span>
            <span class="menu-label">Elenco Personale</span>
            <span id="contatore-elenco" class="menu-badge">0</span>
          </button>
          <button class="menu-item" onclick="mostraGestioneElencoPersonale()">
            <span class="menu-icon">⚙️</span>
            <span class="menu-label">Gestisci Liste</span>
          </button>
        </div>
      </section>

      <!-- Maps & Location -->
      <section class="menu-section">
        <h3 class="menu-section-title">🗺️ Mappe & Posizione</h3>
        <div class="menu-items">
          <button class="menu-item" onclick="mostraMappa()">
            <span class="menu-icon">🗺️</span>
            <span class="menu-label">Visualizza Mappa</span>
          </button>
          <button class="menu-item" onclick="trovaVicinoAMe()">
            <span class="menu-icon">📍</span>
            <span class="menu-label">Trova Vicino a Me</span>
          </button>
          <button class="menu-item" onclick="geocodificaTutteStrutture()">
            <span class="menu-icon">🌍</span>
            <span class="menu-label">Geocoding Automatico</span>
          </button>
        </div>
      </section>

      <!-- Data Management -->
      <section class="menu-section">
        <h3 class="menu-section-title">📊 Gestione Dati</h3>
        <div class="menu-items">
          <button class="menu-item" onclick="mostraOpzioniEsportazioneGenerale()">
            <span class="menu-icon">📤</span>
            <span class="menu-label">Esporta Dati</span>
          </button>
          <button class="menu-item" onclick="mostraFeedAttivita()">
            <span class="menu-icon">📋</span>
            <span class="menu-label">Feed Attività</span>
          </button>
          <button class="menu-item" onclick="location.href='dashboard.html'">
            <span class="menu-icon">📈</span>
            <span class="menu-label">Dashboard</span>
          </button>
        </div>
      </section>

      <!-- Actions -->
      <section class="menu-section">
        <h3 class="menu-section-title">⚡ Azioni Rapide</h3>
        <div class="menu-items">
          <button id="add-btn" class="menu-item menu-item-accent">
            <span class="menu-icon">➕</span>
            <span class="menu-label">Aggiungi Struttura</span>
          </button>
          <button id="resetBtn" class="menu-item">
            <span class="menu-icon">🔄</span>
            <span class="menu-label">Reset Filtri</span>
          </button>
          <div class="view-toggle menu-item">
            <span class="menu-icon">👁️</span>
            <span class="menu-label">Visualizzazione</span>
            <button id="viewToggle" class="view-switch">
              <span class="view-icon">📋</span>
              <span class="view-label">Elenco</span>
            </button>
          </div>
        </div>
      </section>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Results Counter -->
    <div class="results-header">
      <div class="results-info">
        <span id="resultsCount" class="results-count">0 strutture</span>
        <span id="resultsStatus" class="results-status"></span>
      </div>
    </div>
    
    <!-- Results Grid -->
    <section id="results" class="results-container">
      <!-- Cards will be dynamically inserted here -->
    </section>
    
    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator hidden">
      <div class="loading-spinner"></div>
      <span class="loading-text">Caricamento...</span>
    </div>
    
    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">🔍</div>
      <h3 class="empty-title">Nessuna struttura trovata</h3>
      <p class="empty-description">Prova a modificare i filtri o aggiungi una nuova struttura</p>
      <button id="addBtnEmpty" class="btn-primary">➕ Aggiungi Struttura</button>
    </div>
  </main>

  <!-- Modale di modifica -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close">✕</button>
      <h2>Modifica struttura</h2>
      <form id="editForm"></form>
      <div class="modal-actions">
        <button id="saveBtn">💾 Salva</button>
        <button id="deleteBtn" class="danger">🗑️ Elimina</button>
        <button id="cancelBtn">❌ Annulla</button>
      </div>
    </div>
  </div>

<script src="maps.js"></script>
<script src="export.js"></script>
<script src="push-notifications.js"></script>
<script type="module" src="script.js"></script>

<script>
// Registrazione Service Worker per PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      // Prova a registrare il service worker
      const registration = await navigator.serviceWorker.register('./service-worker.js');
      console.log('✅ Service Worker registrato:', registration.scope);
      
      // Gestione aggiornamenti
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Nuovo service worker disponibile
            if (confirm('È disponibile una nuova versione dell\'app. Vuoi aggiornare?')) {
              newWorker.postMessage({ action: 'SKIP_WAITING' });
              window.location.reload();
            }
          }
        });
      });
      
    } catch (error) {
      console.warn('⚠️ Service Worker non disponibile (modalità sviluppo):', error.message);
      // In modalità sviluppo, continua senza service worker
      console.log('📱 App funzionante senza PWA features');
    }
  });
}

// Gestione installazione PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  
  // Mostra pulsante installazione personalizzato
  const installBtn = document.createElement('button');
  installBtn.textContent = '📱 Installa App';
  installBtn.className = 'btn-install';
  installBtn.style.cssText = `
    background: #2f6b2f;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 8px;
  `;
  
  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('Risultato installazione:', outcome);
      deferredPrompt = null;
    }
  });
  
  // Aggiungi pulsante alla topbar
  const controls = document.querySelector('.controls-secondary');
  if (controls) {
    controls.appendChild(installBtn);
  }
});

// Gestione installazione completata
window.addEventListener('appinstalled', () => {
  console.log('✅ PWA installata con successo');
  deferredPrompt = null;
});
</script>

</body>
</html>
